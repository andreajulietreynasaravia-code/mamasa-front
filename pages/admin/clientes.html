<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrador - La Mamasa</title>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
    <link rel="stylesheet" href="../../styles/admin/clientes.css" />
</head>
<body>
  <!-- Login Container -->
  <div class="login-container" id="loginContainer" style="display: none;">
    <div class="icon">
      <i class="fas fa-user-shield"></i>
    </div>
    <h2>Panel Administrador</h2>
    <p class="subtitle">Acceso exclusivo para administradores</p>
    <form id="adminLoginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="correo" placeholder="Correo electrónico" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="contrasena" placeholder="Contraseña" required />
      </div>
      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
    </form>
    <p id="mensaje"></p>
  </div>

  <!-- Top Header Bar -->
  <div class="top-header" id="headerNav" style="display: none;">
    <div class="top-header-left">
      <h1>La Mamasa</h1>
    </div>
  </div>
  
  

  <!-- Panel de Administración -->
  <div class="admin-panel" id="adminPanel" style="display: none;">
    <!-- Layout Container -->
    <div class="layout-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar">👤</div>
          <div class="sidebar-user-name" id="sidebarAdminName">Administrador</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
        <nav class="sidebar-nav">
          <a href="/pages/admin/admin.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">👤</span>
            <span>Administrador</span>
          </a>
          <a href="/pages/admin/trabajadores.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">👤</span>
            <span>Trabajadores</span>
          </a>
          <a href="/pages/admin/clientes.html" class="sidebar-nav-item active">
            <span class="sidebar-nav-icon">👥</span>
            <span>Clientes</span>
          </a>
          <a href="/pages/admin/menu_admin.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">🍽️</span>
            <span>Menú</span>
          </a>
          <a href="/pages/admin/pedidos.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">📦</span>
            <span>Pedidos</span>
          </a>
          <a href="/pages/admin/pagos.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">💳</span>
            <span>Pagos</span>
          </a>
          <a href="/pages/admin/reservas.html" class="sidebar-nav-item">
            <span class="sidebar-nav-icon">📅</span>
            <span>Reservas</span>
          </a>
        </nav>
      </aside>


      <!-- MAIN -->
      <main>
        <div class="content-header">
          <div class="content-title">
            <h2>Clientes - La Mamasa</h2>
            <p>Listado actualizado</p>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <h3>Total Clientes</h3>
            <div class="numero" id="total-clientes">0</div>
          </div>
        </div>

        <div class="controles">
          <input type="text" id="buscar-cliente" placeholder="Buscar clientes..." />
          <button onclick="cargarClientes()">Buscar</button>
          <button onclick="limpiarBusqueda()">Limpiar</button>
        </div>

        <div class="table-container">
          <table id="tabla-clientes">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Dirección</th>
              </tr>
            </thead>
            <tbody id="tbody-clientes">
              <tr><td colspan="5" class="empty-state">Cargando clientes...</td></tr>
            </tbody>
          </table>
        </div>
      </main>

    </div>
  </div>

  <script src="../../scripts/shared/config.js"></script>
  <script src="../../scripts/shared/auth.js"></script>
  <script src="../../scripts/shared/adminAuth.js"></script>
  <script src="../../scripts/admin/clientes.js"></script>
</body>
</html>
