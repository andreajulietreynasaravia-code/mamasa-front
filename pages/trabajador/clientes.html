<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Clientes | La Mamasa - Trabajador</title>
    <link rel="stylesheet" href="../../styles/trabajador/clientes.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- Login Container -->
  <div class="login-container" id="loginContainer">
    <div class="icon">
      <i class="fas fa-user-tie"></i>
    </div>
    <h2>Panel Trabajador</h2>
    <p class="subtitle">Acceso exclusivo para trabajadores</p>
    <form id="trabajadorLoginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="correo" placeholder="Correo electrónico" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="contrasena" placeholder="Contraseña" required />
      </div>
      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
    </form>
    <p id="mensaje"></p>
  </div>

  <!-- Top Header Bar -->
  <div class="top-header">
    <div class="top-header-left">
      <h1>La Mamasa</h1>
    </div>
    <div class="top-header-right">
      <span class="header-icon">👤</span>
      <span class="header-icon">☰</span>
    </div>
  </div>

  <!-- Layout Container -->
  <div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar">👤</div>
        <div class="sidebar-user-name" id="sidebarTrabajadorName">Trabajador</div>
        <div class="sidebar-user-role">Trabajador</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/pages/trabajador/trabajador.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">👤</span>
          <span>Usuario</span>
        </a>
        <a href="/pages/trabajador/clientes.html" class="sidebar-nav-item active">
          <span class="sidebar-nav-icon">👥</span>
          <span>Clientes</span>
        </a>
        <a href="/pages/trabajador/menu_trabajador.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">🍽️</span>
          <span>Menú</span>
        </a>
        <a href="/pages/trabajador/pedidos.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">📦</span>
          <span>Pedidos</span>
        </a>
        <a href="/pages/trabajador/pagos.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">💳</span>
          <span>Pagos</span>
        </a>
        <a href="/pages/trabajador/reservas.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">📅</span>
          <span>Reservas</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main>
      <div class="content-header">
        <div class="content-title">
          <span>👤</span>
          <span>Clientes - La Mamasa</span>
        </div>
        <div class="breadcrumbs">
          <span>🏠</span>
          <a href="#">Clientes - La Mamasa</a>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3>Total Clientes</h3>
          <div class="numero" id="total-clientes">0</div>
        </div>
      </div>

      <div class="controles">
        <input type="text" id="buscar-cliente" placeholder="Buscar por nombre, correo o teléfono...">
        <button onclick="cargarClientes()">🔍 Buscar</button>
        <button onclick="limpiarBusqueda()" class="btn-limpiar">🔄 Limpiar</button>
      </div>

      <div class="table-container">
        <table id="tabla-clientes">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Teléfono</th>
              <th>Dirección</th>
            </tr>
          </thead>
          <tbody id="tbody-clientes">
            <tr>
              <td colspan="5" class="empty-state">Cargando clientes...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

    <script src="../../scripts/shared/config.js"></script>
    <script src="../../scripts/shared/auth.js"></script>
    <script src="../../scripts/shared/trabajadorAuth.js"></script>
    <script src="../../scripts/trabajador/clientes.js"></script>
</body>
</html>
