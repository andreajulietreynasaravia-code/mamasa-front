<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Trabajador - La Mamasa</title>
  <link rel="stylesheet" href="../../styles/trabajador/trabajador.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <!-- Login Container -->
  <div class="login-container" id="loginContainer">
    <div class="icon">
      <i class="fas fa-user-tie"></i>
    </div>
    <h2>Panel Trabajador</h2>
    <p class="subtitle">Acceso exclusivo para trabajadores</p>
    <form id="trabajadorLoginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="correo" placeholder="Correo electrónico" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="contrasena" placeholder="Contraseña" required />
      </div>
      <button type="submit">
        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
      </button>
    </form>
    <p id="mensaje"></p>
  </div>

  <!-- Top Header Bar -->
  <div class="top-header">
    <div class="top-header-left">
      <h1>La Mamasa</h1>
    </div>
    <div class="top-header-right">
      <span class="header-icon">👤</span>
      <span class="header-icon">☰</span>
    </div>
  </div>

  <!-- Layout Container -->
  <div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar">👤</div>
        <div class="sidebar-user-name" id="sidebarTrabajadorName">Trabajador</div>
        <div class="sidebar-user-role">Trabajador</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/pages/trabajador/trabajador.html" class="sidebar-nav-item active">
          <span class="sidebar-nav-icon">👤</span>
          <span>Usuario</span>
        </a>
        <a href="/pages/trabajador/clientes.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">👥</span>
          <span>Clientes</span>
        </a>
        <a href="/pages/trabajador/menu_trabajador.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">🍽️</span>
          <span>Menú</span>
        </a>
        <a href="/pages/trabajador/pedidos.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">📦</span>
          <span>Pedidos</span>
        </a>
        <a href="/pages/trabajador/pagos.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">💳</span>
          <span>Pagos</span>
        </a>
        <a href="/pages/trabajador/reservas.html" class="sidebar-nav-item">
          <span class="sidebar-nav-icon">📅</span>
          <span>Reservas</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main>
      <div class="content-header">
        <div class="content-title">
          <h2>👤 Perfil - La Mamasa</h2>
        </div>
      </div>

      <!-- Sección: Perfil del Trabajador -->
      <section>
        <div class="profile-container">
          <div class="profile-header">
            <div class="profile-avatar">
              <span id="avatarInitialsTrabajador"></span>
            </div>
            <h2 class="profile-title">Perfil</h2>
          </div>
          <div class="profile-info">
            <div class="profile-item">
              <span class="profile-label">Nombre:</span>
              <span class="profile-value" id="nombreTrabajadorProfile"></span>
            </div>
            <div class="profile-item">
              <span class="profile-label">Correo:</span>
              <span class="profile-value" id="correoTrabajadorProfile"></span>
            </div>
            <div class="profile-item">
              <span class="profile-label">Teléfono:</span>
              <span class="profile-value" id="telefonoTrabajadorProfile"></span>
            </div>
          </div>
          <div class="profile-actions">
            <button id="logoutBtnProfileTrabajador" class="btn-logout">Cerrar sesión</button>
          </div>
        </div>
      </section>

    </main>
  </div>
  <script src="../../scripts/shared/config.js"></script>
  <script src="../../scripts/shared/auth.js"></script>
  <script src="../../scripts/shared/trabajadorAuth.js"></script>
  <script src="../../scripts/trabajador/trabajador.js"></script>
</body>
</html>
